<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Student Management System</h2>

    </table>
</div>

<script src="script.js"></script>

</body>
</html>
